version: "3.8"

services: 
  frontend: 
    image: nginx:latest
    container_name: ecommerce_frontend
    ports: 
      - "80:80"
    depends_on: 
      - backend
    networks: 
      - ecommerce_net
  backend:
    image: node:18
    container_name: ecommerce_backend
    working_dir: /app
    volumes: 
      - ./backend:/app
    command: sh  -c "npm install && npm start"
    ports: 
      - "5000:5000"
    depends_on:
      - database
    environment:
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=ecommerce
    networks:
      - ecommerce_net

  database:
    image: mysql:8
    container_name: ecommerce_db
    restart: always
    environment: 
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
    ports: 
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ecommerce_net
  
volumes:
  db_data:
  
networks:
  ecommerce_net: