version: "3.8"


services: 

  mongodb: 
    image: mongo
    container_name: mongo_db
    ports: 
      - "27017:27017"
  
  backend:
    image: node:18
    container_name: backend_app
    depends_on:
      - mongodb
    environment:
      DB_HOST: mongodb
      DB_PORT: 27017
    ports:
      - "5000:5000"
